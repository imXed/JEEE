spring.application.name=club-escalade
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG

# Fake SMTP local config (Lot 5)
spring.mail.host=localhost
spring.mail.port=10025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=no-reply@club-escalade.local
app.password-reset.token-validity-minutes=60

# Seed data config (Lot 2)
app.seed.enabled=true
app.seed.large-dataset=true
app.seed.large.categories=40
app.seed.large.members=300
app.seed.large.sorties=3000
